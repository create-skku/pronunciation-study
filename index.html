<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>발음 학습 — 체크포인트 샘플</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg:      #09101f;
      --panel:   #111928;
      --panel2:  #172035;
      --border:  rgba(255,255,255,0.09);
      --text:    #eef3ff;
      --muted:   #7a94c0;
      --accent:  #7aa2ff;
      --accent2: #9f86ff;
      --ok:      #4dd9a0;
      --warn:    #ffb84d;
      --r:       16px;
    }
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font-family: 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; }

    /* ── ID MODAL ── */
    #idModal {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(5,9,20,0.97);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .mbox {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 24px; padding: 36px 24px;
      max-width: 380px; width: 100%; text-align: center;
    }
    .mbox-icon { font-size: 44px; margin-bottom: 10px; }
    .mbox h2  { margin: 0 0 6px; font-size: 22px; font-weight: 900; }
    .mbox p   { color: var(--muted); font-size: 13px; margin: 0 0 22px; line-height: 1.65; }
    .mbox input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      padding: 14px 16px; font-size: 16px; outline: none;
      text-align: center; margin-bottom: 12px;
    }
    .mbox input:focus { border-color: var(--accent); }
    .btn-main {
      width: 100%; border: 0; border-radius: 12px;
      padding: 14px; font-size: 16px; font-weight: 800; cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; transition: opacity .15s;
    }
    .btn-main:active { opacity: .8; }

    /* ── APP ── */
    #app { display: none; flex-direction: column; max-width: 600px; margin: 0 auto;
      padding: 0 0 80px; }

    /* header */
    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: rgba(17,25,40,0.97); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .hdr-title { font-size: 14px; font-weight: 800; }
    .hdr-user  { font-size: 12px; color: var(--muted);
      background: var(--panel2); border-radius: 20px; padding: 4px 12px; }

    /* video */
    .vid-wrap { width: 100%; aspect-ratio: 16/9; background: #000; }
    .vid-wrap iframe { width: 100%; height: 100%; border: 0; display: block; }

    /* progress bar */
    .cp-bar {
      display: flex; gap: 6px; padding: 12px 16px 4px;
      align-items: center;
    }
    .cp-label { font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .cp-dots  { display: flex; gap: 6px; flex-wrap: wrap; }
    .cp-dot {
      width: 28px; height: 6px; border-radius: 99px;
      background: var(--panel2); border: 1px solid var(--border);
      transition: background .3s;
    }
    .cp-dot.done    { background: var(--ok); border-color: var(--ok); }
    .cp-dot.current { background: var(--warn); border-color: var(--warn); }

    /* info card */
    .info-card {
      margin: 8px 16px 0;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px;
      font-size: 14px; color: var(--muted); line-height: 1.6;
    }
    .info-card b { color: var(--text); }

    /* bottom bar */
    .bot-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-width: 600px; margin: 0 auto;
      background: rgba(9,16,31,0.98); border-top: 1px solid var(--border);
      padding: 12px 16px; display: flex; gap: 8px; z-index: 50;
    }
    .btn-sm {
      flex: 1; height: 48px; border: 0; border-radius: 12px;
      font-size: 14px; font-weight: 800; cursor: pointer;
      background: var(--panel2); color: var(--text);
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity .15s;
    }
    .btn-sm:active { opacity: .75; }
    .btn-sm.accent {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    /* ── CHECKPOINT OVERLAY (bottom sheet) ── */
    #cpOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(5,9,20,0.72);
      align-items: flex-end; justify-content: center;
    }
    #cpOverlay.show { display: flex; }
    .cp-sheet {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 36px;
      width: 100%; max-width: 600px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .cp-handle {
      width: 40px; height: 4px; border-radius: 99px;
      background: var(--border); margin: 0 auto 20px;
    }
    .cp-badge {
      display: inline-block; font-size: 11px; font-weight: 800;
      background: rgba(122,162,255,0.15); color: var(--accent);
      border-radius: 8px; padding: 3px 10px; margin-bottom: 10px;
      letter-spacing: .04em;
    }
    .cp-q { font-size: 17px; font-weight: 700; line-height: 1.5; margin-bottom: 18px; }
    .cp-sub { font-size: 12px; color: var(--muted); margin-top: -12px; margin-bottom: 18px; }

    /* Likert scale */
    .likert-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .likert-row  { display: flex; gap: 8px; }
    .likert-btn  {
      flex: 1; padding: 12px 4px; border: 1px solid var(--border);
      border-radius: 12px; background: var(--panel2);
      color: var(--text); font-size: 13px; font-weight: 700;
      cursor: pointer; text-align: center; transition: all .15s;
    }
    .likert-btn .lnum { font-size: 18px; display: block; }
    .likert-btn .llabel { font-size: 10px; color: var(--muted); display: block; margin-top: 2px; }
    .likert-btn.selected {
      background: rgba(122,162,255,0.2);
      border-color: var(--accent); color: var(--accent);
    }
    .likert-btn.selected .llabel { color: var(--accent); }

    /* Choice buttons */
    .choice-wrap { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .choice-btn  {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border);
      border-radius: 12px; background: var(--panel2);
      color: var(--text); font-size: 15px; font-weight: 700;
      cursor: pointer; text-align: left; display: flex;
      align-items: center; gap: 12px; transition: all .15s;
    }
    .choice-btn .ch-icon {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; flex-shrink: 0;
      transition: all .15s;
    }
    .choice-btn.selected { border-color: var(--accent); background: rgba(122,162,255,0.12); }
    .choice-btn.selected .ch-icon { background: var(--accent); border-color: var(--accent); color: #fff; }
    .choice-btn.correct  { border-color: var(--ok); background: rgba(77,217,160,0.12); }
    .choice-btn.correct .ch-icon { background: var(--ok); border-color: var(--ok); color: #000; }
    .choice-btn.wrong    { border-color: #ff6b6b; background: rgba(255,107,107,0.1); }

    /* Confirm button */
    .btn-confirm {
      width: 100%; height: 52px; border: 0; border-radius: 14px;
      font-size: 16px; font-weight: 800; cursor: pointer;
      background: linear-gradient(135deg, var(--ok), #2fc97a);
      color: #03160c; transition: opacity .15s;
    }
    .btn-confirm:disabled { opacity: .4; cursor: default; }
    .btn-confirm:not(:disabled):active { opacity: .8; }

    /* feedback text */
    .cp-feedback {
      display: none; margin-top: 14px;
      background: var(--panel2); border-radius: 12px;
      padding: 12px 14px; font-size: 13px; line-height: 1.6;
      color: var(--text);
    }
    .cp-feedback.show { display: block; }
    .cp-feedback .fb-label { font-weight: 800; color: var(--ok); margin-bottom: 4px; }

    /* ── LOG PANEL (dev) ── */
    #logPanel {
      margin: 12px 16px 0;
      background: var(--panel2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px 14px;
      font-size: 11px; color: var(--muted); max-height: 120px;
      overflow-y: auto;
    }
    .log-item { padding: 2px 0; border-bottom: 1px solid var(--border); }
    .log-item:last-child { border: none; }
    .log-time { color: var(--accent); margin-right: 6px; }
  </style>
</head>
<body>

<!-- ID Modal -->
<div id="idModal">
  <div class="mbox">
    <div class="mbox-icon">🎙️</div>
    <h2>발음 학습 시작</h2>
    <p>학번 또는 이름을 입력해 주세요.<br>학습 활동이 자동으로 기록됩니다.</p>
    <input id="learnerInput" type="text" placeholder="예) 2024001 또는 이름" maxlength="30"/>
    <button class="btn-main" id="startBtn">시작하기</button>
  </div>
</div>

<!-- Main App -->
<div id="app">

  <div class="hdr">
    <div class="hdr-title">🔊 파열음 학습 — T1</div>
    <div class="hdr-user" id="userLabel">-</div>
  </div>

  <div class="vid-wrap">
    <div id="ytPlayer"></div>
  </div>

  <!-- Checkpoint progress dots -->
  <div class="cp-bar">
    <div class="cp-label">체크포인트</div>
    <div class="cp-dots" id="cpDots"></div>
  </div>

  <!-- Info -->
  <div class="info-card">
    영상을 시청하세요. <b>특정 구간</b>에서 자동으로 잠깐 멈추고 짧은 질문이 나옵니다.
    답변 후 영상이 다시 재생됩니다.
  </div>

  <!-- Dev log (보여주기용, 실제 배포 시 제거) -->
  <div id="logPanel">
    <div class="log-item" style="color:var(--accent);font-weight:800;">📡 Firebase 로그 (개발 확인용)</div>
  </div>

  <!-- Bottom bar -->
  <div class="bot-bar">
    <button class="btn-sm" id="playBtn">▶ 재생</button>
    <button class="btn-sm" id="pauseBtn">⏸ 일시정지</button>
    <button class="btn-sm accent" id="replayBtn">↩ 구간 반복</button>
  </div>

</div>

<!-- Checkpoint Overlay -->
<div id="cpOverlay">
  <div class="cp-sheet">
    <div class="cp-handle"></div>
    <div class="cp-badge" id="cpBadge">체크포인트 1</div>
    <div class="cp-q" id="cpQuestion"></div>
    <div class="cp-sub" id="cpSub"></div>
    <div id="cpOptions"></div>
    <div class="cp-feedback" id="cpFeedback">
      <div class="fb-label" id="fbLabel"></div>
      <div id="fbText"></div>
    </div>
    <button class="btn-confirm" id="cpConfirm" disabled>확인</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  FIREBASE CONFIG  (실제 값으로 교체)
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyACY_txV77iX6gUkIN-q20FhV3c-2fMcYM",
  authDomain: "create-202604.firebaseapp.com",
  projectId: "create-202604",
  storageBucket: "create-202604.firebasestorage.app",
  messagingSenderId: "45657559800",
  appId: "1:45657559800:web:083fea5c150bcfea02210d"
};

// ══════════════════════════════════════════════
//  유튜브 영상 ID  (실제 영상으로 교체)
// ══════════════════════════════════════════════
const VIDEO_ID = "W6Ax_yVbtF4";  // ← 실제 영상 ID로 교체

// ══════════════════════════════════════════════
//  체크포인트 정의
//  time: 영상 내 초(seconds), type: likert | choice
// ══════════════════════════════════════════════
const CHECKPOINTS = [
  {
    id: "cp1",
    time: 15,           // ← 영상 내 타임스탬프(초) — 실제 영상에 맞게 조정
    badge: "인지 확인 ①",
    question: "이 오류 유형이 본인에게 해당된다고 느끼시나요?",
    sub: "Bạn có thấy loại lỗi này liên quan đến bản thân không?",
    type: "likert",
    labels: ["전혀\n아니다", "아니다", "보통", "그렇다", "매우\n그렇다"],
    feedback: "체크해 주셨어요! 이 인식이 연습의 첫걸음입니다. 계속 시청해 보세요."
  },
  {
    id: "cp2",
    time: 35,
    badge: "이해도 퀴즈",
    question: "파형에서 '파'가 '바'보다 긴 것은 무엇인가요?",
    sub: "Trong dạng sóng, phần nào của '파' dài hơn '바'?",
    type: "choice",
    options: [
      { text: "검은 막대 (폐쇄 구간)", correct: false },
      { text: "하얀 공백 (VOT)", correct: true },
      { text: "모음 구간", correct: false }
    ],
    feedbackCorrect: "정확합니다! '파'는 기식이 강해 VOT(하얀 공백)이 가장 길어요. ✅",
    feedbackWrong:   "아쉬워요. '파'는 기식(바람)이 강해서 VOT(하얀 공백)이 가장 길게 나타납니다."
  },
  {
    id: "cp3",
    time: 55,
    badge: "교정 의도",
    question: "이 피드백을 보고 다시 연습하고 싶은 의향이 있으신가요?",
    sub: "Sau khi xem phản hồi này, bạn có muốn luyện tập lại không?",
    type: "likert",
    labels: ["전혀\n없다", "없다", "보통", "있다", "매우\n있다"],
    feedback: "응답해 주셨어요! 의향 데이터가 기록되었습니다."
  }
];

// ══════════════════════════════════════════════
//  Firebase 초기화
// ══════════════════════════════════════════════
let db = null, firebaseReady = false;
try {
  if (typeof firebase !== "undefined") {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
  }
} catch(e) { console.warn("Firebase:", e.message); }

// ══════════════════════════════════════════════
//  세션 상태
// ══════════════════════════════════════════════
let learnerId = "", sessionId = "", sessionStart = null;
let player = null, playerReady = false;
let syncTimer = null;
let cpState = {};          // { cp1: "done"|"active"|"pending" }
let activeCpId = null;
let lastReplayStart = null;

CHECKPOINTS.forEach(cp => { cpState[cp.id] = "pending"; });

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ══════════════════════════════════════════════
//  로그 (Firebase + dev panel)
// ══════════════════════════════════════════════
async function logEvent(type, data) {
  const entry = { learnerId, sessionId, eventType: type,
    videoId: VIDEO_ID, ts: new Date().toISOString(), ...data };

  // Dev panel
  const panel = document.getElementById("logPanel");
  const div = document.createElement("div");
  div.className = "log-item";
  const t = new Date().toLocaleTimeString("ko");
  div.innerHTML = `<span class="log-time">${t}</span><b>${type}</b> ${JSON.stringify(data).slice(0,80)}`;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;

  // Firebase
  if (!firebaseReady || !db || !learnerId) return;
  try {
    await db.collection("learningLogs").add({
      ...entry,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) { console.warn("log error:", e.message); }
}

// ══════════════════════════════════════════════
//  체크포인트 도트 렌더
// ══════════════════════════════════════════════
function renderDots() {
  const wrap = document.getElementById("cpDots");
  wrap.innerHTML = "";
  CHECKPOINTS.forEach(cp => {
    const d = document.createElement("div");
    d.className = "cp-dot " + (cpState[cp.id] === "done" ? "done" : cpState[cp.id] === "active" ? "current" : "");
    wrap.appendChild(d);
  });
}
renderDots();

// ══════════════════════════════════════════════
//  체크포인트 오버레이 표시
// ══════════════════════════════════════════════
function showCheckpoint(cp) {
  if (player && playerReady) player.pauseVideo();
  activeCpId = cp.id;
  cpState[cp.id] = "active";
  renderDots();

  document.getElementById("cpBadge").textContent = cp.badge || "체크포인트";
  document.getElementById("cpQuestion").textContent = cp.question;
  document.getElementById("cpSub").textContent = cp.sub || "";

  const opts = document.getElementById("cpOptions");
  opts.innerHTML = "";
  const confirm = document.getElementById("cpConfirm");
  confirm.disabled = true;
  confirm.textContent = "확인";

  const fb = document.getElementById("cpFeedback");
  fb.className = "cp-feedback";

  let selectedAnswer = null;
  let answered = false;

  if (cp.type === "likert") {
    const wrap = document.createElement("div");
    wrap.className = "likert-wrap";
    const row = document.createElement("div");
    row.className = "likert-row";
    (cp.labels || ["1","2","3","4","5"]).forEach((lbl, i) => {
      const btn = document.createElement("button");
      btn.className = "likert-btn";
      const lines = lbl.split("\n");
      btn.innerHTML = `<span class="lnum">${i+1}</span><span class="llabel">${lines[lines.length-1]}</span>`;
      btn.addEventListener("click", () => {
        if (answered) return;
        row.querySelectorAll(".likert-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedAnswer = i + 1;
        confirm.disabled = false;
      });
      row.appendChild(btn);
    });
    wrap.appendChild(row);
    opts.appendChild(wrap);

    confirm.addEventListener("click", onConfirmOnce = function handler() {
      if (selectedAnswer === null) return;
      answered = true;
      document.getElementById("fbLabel").textContent = "✅ 기록 완료";
      document.getElementById("fbText").textContent = cp.feedback || "응답이 저장되었습니다.";
      fb.className = "cp-feedback show";
      confirm.textContent = "계속 시청하기 →";
      confirm.removeEventListener("click", handler);
      confirm.addEventListener("click", closeCheckpoint);
      logEvent("checkpoint_answer", { cpId: cp.id, type: "likert", value: selectedAnswer });
    });

  } else if (cp.type === "choice") {
    const wrap = document.createElement("div");
    wrap.className = "choice-wrap";
    const labels = ["A","B","C","D"];
    cp.options.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      btn.innerHTML = `<span class="ch-icon">${labels[i]}</span><span>${opt.text}</span>`;
      btn.addEventListener("click", () => {
        if (answered) return;
        wrap.querySelectorAll(".choice-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedAnswer = { index: i, correct: opt.correct };
        confirm.disabled = false;
      });
      wrap.appendChild(btn);
    });
    opts.appendChild(wrap);

    confirm.addEventListener("click", onConfirmOnce = function handler() {
      if (!selectedAnswer) return;
      answered = true;
      // Show correct/wrong
      wrap.querySelectorAll(".choice-btn").forEach((btn, i) => {
        btn.classList.remove("selected");
        if (cp.options[i].correct) btn.classList.add("correct");
        else if (i === selectedAnswer.index && !selectedAnswer.correct) btn.classList.add("wrong");
      });
      const isCorrect = selectedAnswer.correct;
      document.getElementById("fbLabel").textContent = isCorrect ? "✅ 정답!" : "❌ 오답";
      document.getElementById("fbText").textContent = isCorrect ? cp.feedbackCorrect : cp.feedbackWrong;
      fb.className = "cp-feedback show";
      confirm.textContent = "계속 시청하기 →";
      confirm.removeEventListener("click", handler);
      confirm.addEventListener("click", closeCheckpoint);
      logEvent("checkpoint_answer", {
        cpId: cp.id, type: "choice",
        selectedIndex: selectedAnswer.index,
        correct: isCorrect
      });
    });
  }

  document.getElementById("cpOverlay").className = "show";
  logEvent("checkpoint_shown", { cpId: cp.id, time: player?.getCurrentTime?.() || 0 });
}

function closeCheckpoint() {
  document.getElementById("cpOverlay").className = "";
  cpState[activeCpId] = "done";
  activeCpId = null;
  renderDots();
  if (player && playerReady) player.playVideo();
  logEvent("checkpoint_closed", { cpId: activeCpId });
}

// ══════════════════════════════════════════════
//  YouTube IFrame API
// ══════════════════════════════════════════════
window.onYouTubeIframeAPIReady = function() {
  player = new YT.Player("ytPlayer", {
    videoId: VIDEO_ID,
    host: "https://www.youtube.com",
    playerVars: { rel: 0, modestbranding: 1, enablejsapi: 1,
      origin: location.origin || "" },
    events: {
      onReady: function() {
        playerReady = true;
        if (syncTimer) clearInterval(syncTimer);
        syncTimer = setInterval(checkTick, 400);
        logEvent("player_ready", { videoId: VIDEO_ID });
      },
      onStateChange: function(e) {
        const s = {"-1":"unstarted","0":"ended","1":"playing","2":"paused","3":"buffering","5":"cued"};
        logEvent("player_state", { state: s[e.data] || e.data });
      }
    }
  });
};

// 타임스탬프 체크
let lastCheckedTime = -1;
function checkTick() {
  if (!player || !playerReady) return;
  if (document.getElementById("cpOverlay").className === "show") return; // 오버레이 중 스킵
  const t = player.getCurrentTime();
  if (Math.abs(t - lastCheckedTime) < 0.1) return;
  lastCheckedTime = t;

  for (const cp of CHECKPOINTS) {
    if (cpState[cp.id] !== "pending") continue;
    if (t >= cp.time) {
      showCheckpoint(cp);
      break;
    }
  }
}

// ══════════════════════════════════════════════
//  버튼 이벤트
// ══════════════════════════════════════════════
document.getElementById("playBtn").addEventListener("click", () => {
  if (player && playerReady) player.playVideo();
  logEvent("manual_play", {});
});
document.getElementById("pauseBtn").addEventListener("click", () => {
  if (player && playerReady) player.pauseVideo();
  logEvent("manual_pause", {});
});
document.getElementById("replayBtn").addEventListener("click", () => {
  if (!player || !playerReady) return;
  const t = player.getCurrentTime();
  const replayTo = Math.max(0, t - 15);
  player.seekTo(replayTo, true);
  player.playVideo();
  logEvent("replay_15s", { from: t, to: replayTo });
});

// ══════════════════════════════════════════════
//  세션 시작
// ══════════════════════════════════════════════
document.getElementById("startBtn").addEventListener("click", function() {
  const n = document.getElementById("learnerInput").value.trim();
  if (!n) { alert("이름 또는 학번을 입력해 주세요."); return; }
  learnerId = n; sessionId = genId(); sessionStart = Date.now();
  document.getElementById("idModal").style.display = "none";
  document.getElementById("userLabel").textContent = learnerId;
  document.getElementById("app").style.display = "flex";
  logEvent("session_start", { learnerId, sessionId });
});
document.getElementById("learnerInput").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("startBtn").click();
});

window.addEventListener("beforeunload", () => {
  if (!learnerId) return;
  logEvent("session_end", {
    durationSec: sessionStart ? Math.round((Date.now()-sessionStart)/1000) : 0
  });
});
</script>

<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
