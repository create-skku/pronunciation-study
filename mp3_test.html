<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>발음 학습 플레이어</title>
<style>
:root {
  --bg: #0D1B2A;
  --card: #1A2E45;
  --card2: #1E3652;
  --border: rgba(255,255,255,0.08);
  --text: #E8F0FE;
  --muted: #7A9CC0;
  --accent: #4FC3F7;
  --accent2: #29B6F6;
  --ok: #4DD9A0;
  --warn: #FFB74D;
  --r: 18px;
}
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
  font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; min-height: 100vh; }

body {
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}

.player-wrap {
  width: 100%; max-width: 480px;
}

/* 슬라이드 카드 */
.slide-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 24px 20px 20px;
  margin-bottom: 12px;
  min-height: 180px;
  position: relative;
  overflow: hidden;
}
.slide-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.slide-num {
  font-size: 11px; font-weight: 800; letter-spacing: .1em;
  color: var(--accent); margin-bottom: 10px;
  text-transform: uppercase;
}
.slide-title {
  font-size: 18px; font-weight: 800; line-height: 1.4;
  color: var(--text); margin-bottom: 8px;
}
.slide-body {
  font-size: 14px; line-height: 1.75; color: var(--muted);
}
.slide-body b { color: var(--text); }
.slide-viet {
  font-size: 12px; color: rgba(79,195,247,.7);
  font-style: italic; margin-top: 10px; line-height: 1.6;
}

/* 재생 진행 바 */
.progress-wrap {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px;
  margin-bottom: 12px;
}
.progress-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.time-cur { font-size: 13px; font-weight: 700; color: var(--accent); min-width: 36px; }
.time-total { font-size: 13px; color: var(--muted); min-width: 36px; text-align: right; }
.prog-bar-outer {
  flex: 1; height: 6px; background: var(--card2);
  border-radius: 99px; cursor: pointer; position: relative;
}
.prog-bar-inner {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  width: 0%; transition: width .1s linear;
  pointer-events: none;
}
.prog-bar-thumb {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent); left: 0%;
  margin-left: -7px; transition: left .1s linear;
  pointer-events: none;
}

/* 컨트롤 버튼 */
.ctrl-row {
  display: flex; gap: 8px; align-items: center; justify-content: center;
}
.ctrl-btn {
  display: flex; align-items: center; justify-content: center;
  border: 0; border-radius: 14px; cursor: pointer;
  font-weight: 800; transition: opacity .15s, transform .1s;
}
.ctrl-btn:active { opacity: .75; transform: scale(.96); }

.btn-play {
  width: 64px; height: 64px; border-radius: 50%;
  font-size: 22px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #000;
  box-shadow: 0 4px 20px rgba(79,195,247,.35);
}
.btn-secondary {
  width: 50px; height: 50px; border-radius: 50%;
  font-size: 16px;
  background: var(--card2); color: var(--muted);
}
.btn-replay {
  flex: 1; height: 44px; border-radius: 12px;
  font-size: 13px; background: var(--card2); color: var(--muted);
  gap: 6px;
}

/* 슬라이드 네비 도트 */
.nav-dots {
  display: flex; gap: 6px; justify-content: center;
  padding: 8px 0 4px;
}
.nav-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--card2); border: 1px solid var(--border);
  cursor: pointer; transition: all .2s;
}
.nav-dot.active { background: var(--accent); border-color: var(--accent); width: 22px; border-radius: 4px; }
.nav-dot.done { background: var(--ok); border-color: var(--ok); }

/* 파일명 표시 */
.file-label {
  text-align: center; font-size: 11px; color: var(--muted);
  margin-top: 8px; letter-spacing: .03em;
}

/* 로딩 */
.loading-msg {
  text-align: center; color: var(--muted); font-size: 14px;
  padding: 20px 0; display: none;
}
.loading-msg.show { display: block; }

/* 에러 */
.error-msg {
  background: rgba(255,107,107,.12); border: 1px solid rgba(255,107,107,.3);
  border-radius: 12px; padding: 12px 16px;
  font-size: 13px; color: #FF8A80; display: none; margin-top: 8px;
  line-height: 1.6;
}
.error-msg.show { display: block; }
</style>
</head>
<body>

<div class="player-wrap">

  <!-- 슬라이드 카드 -->
  <div class="slide-card">
    <div class="slide-num" id="slideNum">슬라이드 1 / 1</div>
    <div class="slide-title" id="slideTitle">파열음 발음 피드백</div>
    <div class="slide-body" id="slideBody">
      평음 · 경음 · 격음 발음 연습<br>
      <b>실험-T1 · 3지 미변별 (바 ≈ 빠 ≈ 파)</b><br>
      오류 확인 → 교정 설명 → 핵심 포인트 → 연습 → 재녹음
    </div>
    <div class="slide-viet" id="slideViet">
      Luyện tập phát âm: âm bình thường · căng thẳng · bật hơi
    </div>
  </div>

  <!-- 진행바 + 컨트롤 -->
  <div class="progress-wrap">
    <!-- 진행바 -->
    <div class="progress-row">
      <span class="time-cur" id="timeCur">0:00</span>
      <div class="prog-bar-outer" id="progOuter">
        <div class="prog-bar-inner" id="progInner"></div>
        <div class="prog-bar-thumb" id="progThumb"></div>
      </div>
      <span class="time-total" id="timeTotal">0:00</span>
    </div>
    <!-- 컨트롤 -->
    <div class="ctrl-row">
      <button class="ctrl-btn btn-replay" id="replayBtn">↩ 5초 전</button>
      <button class="ctrl-btn btn-play" id="playBtn">▶</button>
      <button class="ctrl-btn btn-replay" id="fwdBtn">5초 후 ↪</button>
    </div>
  </div>

  <!-- 슬라이드 도트 네비 -->
  <div class="nav-dots" id="navDots"></div>
  <div class="file-label" id="fileLabel">📁 mp3/00_첫페이지.mp3</div>
  <div class="loading-msg" id="loadingMsg">⏳ 음성 파일 로딩 중...</div>
  <div class="error-msg" id="errorMsg"></div>

</div>

<!-- 숨김 오디오 -->
<audio id="audioEl" preload="auto"></audio>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  슬라이드 데이터
//  mp3 경로: GitHub Pages 기준
//  예) https://[username].github.io/[repo]/mp3/파일명.mp3
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var MP3_BASE = "mp3/";   // ← GitHub Pages 배포 후 경로

var SLIDES = [
  {
    file:  "00_첫페이지.mp3",
    title: "파열음 발음 피드백",
    body:  "평음 · 경음 · 격음 발음 연습<br><b>실험-T1 · 3지 미변별 (바 ≈ 빠 ≈ 파)</b><br>오류 확인 → 교정 설명 → 핵심 포인트 → 연습 → 재녹음",
    viet:  "Luyện tập phát âm: âm bình thường · căng thẳng · bật hơi",
    num:   "슬라이드 1"
  }
  // ← 이후 슬라이드 추가 예시:
  // {
  //   file:  "01_오류확인.mp3",
  //   title: "발음 오류 유형 — T1",
  //   body:  "'바'·'빠'·'파' 세 소리가 비슷하게 들립니다.",
  //   viet:  "Ba âm '바·빠·파' nghe giống nhau...",
  //   num:   "슬라이드 2"
  // },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  상태
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var audio    = document.getElementById("audioEl");
var curIdx   = 0;
var playing  = false;
var dragging = false;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  DOM 헬퍼
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function $$(id) { return document.getElementById(id); }

function fmt(s) {
  s = Math.max(0, Math.floor(s || 0));
  return Math.floor(s/60) + ":" + ("0" + (s%60)).slice(-2);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  슬라이드 로드
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function loadSlide(idx) {
  var s = SLIDES[idx];
  $$("slideNum").textContent   = s.num + " / " + SLIDES.length;
  $$("slideTitle").textContent = s.title;
  $$("slideBody").innerHTML    = s.body;
  $$("slideViet").textContent  = s.viet || "";
  $$("fileLabel").textContent  = "📁 " + MP3_BASE + s.file;
  $$("timeCur").textContent    = "0:00";
  $$("timeTotal").textContent  = "0:00";
  setProgress(0);

  $$("loadingMsg").className = "loading-msg show";
  $$("errorMsg").className   = "error-msg";

  audio.src = MP3_BASE + s.file;
  audio.load();
  renderDots();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  진행바
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function setProgress(pct) {
  pct = Math.min(100, Math.max(0, pct));
  $$("progInner").style.width = pct + "%";
  $$("progThumb").style.left  = pct + "%";
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  도트 렌더
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderDots() {
  var wrap = $$("navDots");
  wrap.innerHTML = "";
  SLIDES.forEach(function(s, i) {
    var d = document.createElement("div");
    d.className = "nav-dot" + (i === curIdx ? " active" : i < curIdx ? " done" : "");
    d.addEventListener("click", function() { jumpSlide(i); });
    wrap.appendChild(d);
  });
}

function jumpSlide(i) {
  audio.pause();
  playing = false;
  $$("playBtn").textContent = "▶";
  curIdx = i;
  loadSlide(i);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  오디오 이벤트
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
audio.addEventListener("canplay", function() {
  $$("loadingMsg").className = "loading-msg";
  $$("timeTotal").textContent = fmt(audio.duration);
});

audio.addEventListener("timeupdate", function() {
  if (dragging) return;
  var pct = audio.duration ? (audio.currentTime / audio.duration * 100) : 0;
  setProgress(pct);
  $$("timeCur").textContent = fmt(audio.currentTime);
});

audio.addEventListener("ended", function() {
  playing = false;
  $$("playBtn").textContent = "▶";
  setProgress(100);
  // 슬라이드 자동 넘김
  if (curIdx < SLIDES.length - 1) {
    setTimeout(function() {
      curIdx++;
      loadSlide(curIdx);
      // 자동 재생
      audio.play().then(function() {
        playing = true;
        $$("playBtn").textContent = "⏸";
      }).catch(function(){});
    }, 800);
  }
});

audio.addEventListener("error", function() {
  $$("loadingMsg").className = "loading-msg";
  $$("errorMsg").className = "error-msg show";
  $$("errorMsg").innerHTML =
    "⚠️ 파일을 불러올 수 없습니다.<br>" +
    "<small>경로: <b>" + audio.src + "</b><br>" +
    "GitHub Pages에 mp3/ 폴더가 있는지 확인해 주세요.</small>";
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  컨트롤 버튼
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
$$("playBtn").addEventListener("click", function() {
  if (playing) {
    audio.pause();
    playing = false;
    $$("playBtn").textContent = "▶";
  } else {
    audio.play().then(function() {
      playing = true;
      $$("playBtn").textContent = "⏸";
    }).catch(function(e) {
      $$("errorMsg").className = "error-msg show";
      $$("errorMsg").textContent = "재생 오류: " + e.message;
    });
  }
});

$$("replayBtn").addEventListener("click", function() {
  audio.currentTime = Math.max(0, audio.currentTime - 5);
});

$$("fwdBtn").addEventListener("click", function() {
  audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 5);
});

// 진행바 클릭으로 seek
$$("progOuter").addEventListener("click", function(e) {
  if (!audio.duration) return;
  var rect = this.getBoundingClientRect();
  var pct  = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  초기화
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
loadSlide(0);
renderDots();
</script>
</body>
</html>
